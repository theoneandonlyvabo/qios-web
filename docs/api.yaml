openapi: 3.0.3

info:
  title: QIOS API
  description: API contract antara client (Next.js) dan server (Go + Echo) untuk platform QIOS.
  version: 0.1.0
  contact:
    name: QIOS Development Team

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.qios.id
    description: Production

# ============================================================
# SECURITY
# ============================================================

securitySchemes:
  BearerAuth:
    type: http
    scheme: bearer
    bearerFormat: JWT

# ============================================================
# PATHS
# ============================================================

paths:

  # ----------------------------------------------------------
  # AUTH
  # ----------------------------------------------------------

  /auth/login:
    post:
      tags: [Auth]
      summary: Login dengan email dan password
      description: >
        Autentikasi user menggunakan email dan password.
        Jika berhasil, mengembalikan access token di body
        dan menyimpan refresh token di httpOnly cookie.
        Email harus sudah terdaftar sebagai mitra QIOS.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: owner@email.com
                password:
                  type: string
                  format: password
                  example: password123
      responses:
        '200':
          description: Login berhasil
          headers:
            Set-Cookie:
              description: Refresh token disimpan di httpOnly cookie
              schema:
                type: string
                example: refresh_token=eyJhb...; HttpOnly; Secure; SameSite=Strict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccess'
        '401':
          description: Email atau password salah
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                data: null
                error: Email atau password salah
        '403':
          description: Email belum terdaftar sebagai mitra QIOS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                data: null
                error: Akun ini belum terdaftar sebagai mitra QIOS

  /auth/google:
    post:
      tags: [Auth]
      summary: Login dengan Google OAuth
      description: >
        Dipanggil oleh Next.js (via NextAuth) setelah Google 
        OAuth berhasil. Next.js mengirim user info yang didapat
        dari Google, Go memverifikasi apakah email terdaftar 
        sebagai mitra, lalu issue JWT sendiri. Refresh token 
        disimpan di httpOnly cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, name]
              properties:
                email:
                  type: string
                  format: email
                  example: owner@gmail.com
                name:
                  type: string
                  example: Budi Santoso
      responses:
        '200':
          description: Login berhasil
          headers:
            Set-Cookie:
              description: Refresh token disimpan di httpOnly cookie
              schema:
                type: string
                example: refresh_token=eyJhb...; HttpOnly; Secure; SameSite=Strict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccess'
        '403':
          description: Email belum terdaftar sebagai mitra QIOS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                data: null
                error: Akun ini belum terdaftar sebagai mitra QIOS

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: >
        Membaca refresh token dari httpOnly cookie,
        memverifikasinya, dan mengembalikan access token baru.
        Dipanggil otomatis oleh Next.js ketika access token 
        expired.
      responses:
        '200':
          description: Access token baru berhasil di-issue
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                        example: eyJhb...
                  error:
                    type: string
                    nullable: true
                    example: null
        '401':
          description: Refresh token tidak valid atau expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                data: null
                error: Sesi telah berakhir, silakan login kembali

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: >
        Menghapus refresh token dari httpOnly cookie
        dan menginvalidasi sesi user. Access token di 
        sisi client harus dihapus dari memory oleh Next.js.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logout berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: string
                    nullable: true
                    example: null
                  error:
                    type: string
                    nullable: true
                    example: null
        '401':
          $ref: '#/components/responses/Unauthorized'

# ============================================================
# COMPONENTS
# ============================================================

components:

  schemas:

    AuthSuccess:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            access_token:
              type: string
              example: eyJhb...
            user:
              $ref: '#/components/schemas/UserWithBusiness'
        error:
          type: string
          nullable: true
          example: null

    UserWithBusiness:
      type: object
      properties:
        id:
          type: string
          example: usr_abc123
        email:
          type: string
          format: email
          example: owner@email.com
        business:
          $ref: '#/components/schemas/Business'

    Business:
      type: object
      properties:
        id:
          type: string
          example: biz_xyz789
        name:
          type: string
          example: Warung Makan Pak Budi
        location:
          type: string
          example: Jakarta Selatan

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        data:
          type: string
          nullable: true
          example: null
        error:
          type: string
          example: Pesan error

  responses:
    Unauthorized:
      description: Access token tidak valid atau tidak ada
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            data: null
            error: Unauthorized
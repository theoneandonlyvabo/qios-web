# infra/docker-compose.yml
#
# Stack observability QIOS:
#   - Prometheus  : scrape metrics dari Go server (port 9090)
#   - Loki        : agregasi log (port 3100)
#   - Grafana     : dashboard visual, konek ke Prometheus + Loki (port 3000)
#   - Uptime Kuma : monitor uptime endpoint (port 3001)
#
# Jalanin: docker compose up -d
# Grafana default login: admin / admin (ganti setelah first login)

version: "3.9"

networks:
  qios-infra:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  uptime_kuma_data:

services:
  # ─── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: qios-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - qios-infra

  # ─── Loki ─────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.7
    container_name: qios-loki
    restart: unless-stopped
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "3100:3100"
    networks:
      - qios-infra

  # ─── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: qios-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - qios-infra

  # ─── Uptime Kuma ──────────────────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: qios-uptime
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "3001:3001"
    networks:
      - qios-infra
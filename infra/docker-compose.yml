networks:
  qios-infra:
    driver: bridge
  qios-shared:
    external: true

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  uptime_kuma_data:

services:
  # ─── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: ${APP_NAME}-prometheus
    restart: unless-stopped
    labels:
      logging: "promtail"
    environment:
      - APP_NAME=${APP_NAME}
      - APP_CONTAINER=${APP_CONTAINER}
      - APP_PORT=${APP_PORT}
      - APP_METRICS_PATH=${APP_METRICS_PATH}
    volumes:
      - ./prometheus/prometheus.yml.tmpl:/etc/prometheus/prometheus.yml.tmpl:ro
      - prometheus_data:/prometheus
    entrypoint:
      - sh
      - -c
      - |
        envsubst < /etc/prometheus/prometheus.yml.tmpl > /etc/prometheus/prometheus.yml
        exec /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=${PROMETHEUS_RETENTION} \
          --web.enable-lifecycle
    ports:
      - "9090:9090"
    networks:
      - ${APP_NAME}-infra
      - ${APP_NAME}-shared

  # ─── Loki ─────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.7
    container_name: ${APP_NAME}-loki
    restart: unless-stopped
    labels:
      logging: "promtail"
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml -retention-period=${LOKI_RETENTION}
    ports:
      - "3100:3100"
    networks:
      - ${APP_NAME}-infra

  # ─── Promtail ─────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.7
    container_name: ${APP_NAME}-promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki
    networks:
      - ${APP_NAME}-infra
      - ${APP_NAME}-shared

  # ─── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: ${APP_NAME}-grafana
    restart: unless-stopped
    labels:
      logging: "promtail"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - ${APP_NAME}-infra
      - ${APP_NAME}-shared

  # ─── Uptime Kuma ──────────────────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: ${APP_NAME}-uptime
    restart: unless-stopped
    labels:
      logging: "promtail"
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "3001:3001"
    networks:
      - ${APP_NAME}-infra
